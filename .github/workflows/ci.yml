name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Python unit & integration tests
        run: python -m unittest discover -s tests -v

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Frontend syntax checks
        run: |
          node --check static/app.js
          node --check static/js/editor.js
          node --check static/js/state.js
          node --check static/js/import.js
          node --check static/js/add.js
          node --check static/js/utils.js
          node --check static/js/api.js
          node --check static/js/dialogs.js
          node --check static/js/settings.js
          node --check static/js/tasks.js

      - name: Frontend state tests
        run: node --test tests/state.test.mjs
